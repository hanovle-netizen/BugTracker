version: '3.8'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/000001_init.up.sql
    networks:
      - backend_network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9002:9000"
    volumes:
      - minio_data:/data
    networks:
      backend_network:
        aliases:
          - minio
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/dockerfile.prod
    ports:
      - "127.0.0.1:9191:9191"
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PHOTO_STORAGE: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-tasktracker-photos}
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
    depends_on:
      - postgres
      - minio
    networks:
      - backend_network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  backend_network:
    driver: bridge
