server {
    listen 80;
    server_name bug-tracker.sytes.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bug-tracker.sytes.net;

    ssl_certificate     /etc/letsencrypt/live/bug-tracker.sytes.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bug-tracker.sytes.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/bugtracker;
    index index.html;
    client_max_body_size 15m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://127.0.0.1:9191;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /minio/ {
        proxy_pass http://127.0.0.1:9002/;
        proxy_set_header Host $http_host;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
